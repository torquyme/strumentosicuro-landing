    <path d="M238 62v198M256 58v202M274 62v198" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <path d="M228 129h56M228 152h56M228 175h56M228 198h56M228 221h56" stroke="white" stroke-width="3" opacity="0.75"/>
    <circle cx="208" cy="75" r="10" fill="url(#g)"/><circle cx="208" cy="105" r="10" fill="url(#g)"/><circle cx="208" cy="135" r="10" fill="url(#g)"/>
    <circle cx="304" cy="75" r="10" fill="url(#g)"/><circle cx="304" cy="105" r="10" fill="url(#g)"/><circle cx="304" cy="135" r="10" fill="url(#g)"/>
    <path d="M218 75h-24M218 105h-24M218 135h-24M294 75h24M294 105h24M294 135h24" stroke="url(#g)" stroke-width="8" stroke-linecap="round"/>
