</g>
  <text class="word" x="330" y="177" fill="#061f3f">Strumento</text>
  <text class="word" x="840" y="177" fill="#d99a20">Sicuro</text>
  <text x="336" y="225" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600" letter-spacing=".5" fill="#64748b">Compravendite protette per strumenti musicali usati</text>
