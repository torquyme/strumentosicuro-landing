  <g>
    <path d="M335 275c27 11 50 11 77 0v45c0 39-24 66-77 85-53-19-77-46-77-85v-45c27 11 50 11 77 0z" fill="white"/>
    <path d="M335 290c22 9 40 9 62 0v31c0 29-18 49-62 65-44-16-62-36-62-65v-31c22 9 40 9 62 0z" fill="url(#g)"/>
