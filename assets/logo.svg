<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 300" role="img" aria-label="StrumentoSicuro">
  <defs>
    <style>
      .word { font-family: Georgia, 'Times New Roman', serif; font-size: 112px; font-weight: 500; letter-spacing: -5px; }
    </style>
  </defs>
  <g transform="translate(12 4) scale(0.57)">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f1b544"/>
      <stop offset="1" stop-color="#d99a20"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#061f3f" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- exchange arrows -->
  <path d="M113 334C72 269 83 179 139 126" fill="none" stroke="#061f3f" stroke-width="18" stroke-linecap="round"/>
  <path d="M122 121l62-7-33 53z" fill="#061f3f"/>
  <path d="M399 178c42 65 31 155-25 208" fill="none" stroke="url(#g)" stroke-width="18" stroke-linecap="round"/>
  <path d="M390 391l-62 7 33-53z" fill="url(#g)"/>

  <!-- box -->
  <g filter="url(#shadow)">
    <path d="M139 215l116 52v135L139 340z" fill="#061f3f"/>
    <path d="M373 215l-118 52v135l118-62z" fill="#08284f"/>
    <path d="M139 215l116-54 118 54-118 52z" fill="#0a315f"/>
    <path d="M139 215l80-81 36 27z" fill="#061f3f"/>
    <path d="M373 215l-82-81-36 27z" fill="#061f3f"/>
    <path d="M255 161v241" stroke="white" stroke-opacity="0.92" stroke-width="8"/>
    <path d="M139 215l116 52 118-52" fill="none" stroke="white" stroke-opacity="0.92" stroke-width="8" stroke-linejoin="round"/>
  </g>

  <!-- guitar neck/headstock -->
